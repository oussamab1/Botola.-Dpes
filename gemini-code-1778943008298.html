<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة FIFA - تسيير النقط المحمي</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-color: #f8fafc;
            --success-color: #22c55e;
            --warning-color: #eab308;
            --danger-color: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            color: var(--accent-color);
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        /* ستايل الخانة السرية للآدمين */
        .admin-zone {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px dashed var(--accent-color);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        .admin-zone label {
            font-weight: bold;
            color: #94a3b8;
            margin-left: 10px;
        }

        .admin-zone input {
            background-color: #0f172a;
            border: 2px solid #334155;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 3px;
            width: 120px;
            transition: border-color 0.3s;
        }

        .admin-zone input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(56, 189, 248, 0.5);
        }

        /* ستايل الكارط ديال اللاعبين */
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .player-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #334155;
            transition: transform 0.2s;
        }

        .player-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .player-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .player-score {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-color);
            margin: 15px 0;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .btn-plus3 { background-color: var(--success-color); color: white; }
        .btn-plus1 { background-color: var(--warning-color); color: #0f172a; }
        .btn-minus { background-color: var(--danger-color); color: white; }

        button:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        /* ستايل جدول الترتيب */
        .leaderboard {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .leaderboard h2 {
            margin-top: 0;
            color: var(--accent-color);
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            text-align: right;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #334155;
        }

        th {
            color: #94a3b8;
            font-weight: 600;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .rank {
            font-weight: bold;
            width: 50px;
        }
        
        tr:nth-child(1) .rank { color: #ffd700; } 
        tr:nth-child(2) .rank { color: #c0c0c0; } 
        tr:nth-child(3) .rank { color: #cd7f32; }

    </style>
</head>
<body>

    <div class="container">
        <h1>🏆 بطولة FIFA 🏆</h1>
        
        <!-- خانة التحكم السرية للآدمين فقط -->
        <div class="admin-zone">
            <label for="admin-pin">🔑 وضع الـ Admin (اكتب الكود لتعديل النقط):</label>
            <input type="password" id="admin-pin" placeholder="****" maxlength="4">
        </div>
        
        <!-- البلاصة فين كاينين الكارطات ديال اللعابة -->
        <div class="players-grid" id="players-container"></div>

        <!-- جدول الترتيب -->
        <div class="leaderboard">
            <h2>📊 جدول الترتيب الحالي</h2>
            <table>
                <thead>
                    <tr>
                        <th class="rank">المركز</th>
                        <th>اللاعب</th>
                        <th>النقط</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // الكود السري ديالك
        const SECRET_PIN = "7770";

        // السميات ديالكم واجدين هنا
        let players = [
            { id: 1, name: "soufian", points: 0 },
            { id: 2, name: "matin", points: 0 },
            { id: 3, name: "oussama", points: 0 },
            { id: 4, name: "bilal", points: 0 }
        ];

        function updateUI() {
            const container = document.getElementById('players-container');
            const leaderboardBody = document.getElementById('leaderboard-body');
            
            container.innerHTML = '';
            players.forEach(player => {
                const card = document.createElement('div');
                card.className = 'player-card';
                card.innerHTML = `
                    <div class="player-name">${player.name}</div>
                    <div class="player-score">${player.points}</div>
                    <div class="btn-group">
                        <button class="btn-plus3" onclick="changePoints(${player.id}, 3)">3+</button>
                        <button class="btn-plus1" onclick="changePoints(${player.id}, 1)">1+</button>
                        <button class="btn-minus" onclick="changePoints(${player.id}, -1)">1-</button>
                    </div>
                `;
                container.appendChild(card);
            });

            const sortedPlayers = [...players].sort((a, b) => b.points - a.points);

            leaderboardBody.innerHTML = '';
            sortedPlayers.forEach((player, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="rank">#${index + 1}</td>
                    <td><strong>${player.name}</strong></td>
                    <td style="color: var(--accent-color); font-weight: bold;">${player.points} pts</td>
                `;
                leaderboardBody.appendChild(row);
            });
        }

        function changePoints(playerId, amount) {
            const enteredPin = document.getElementById('admin-pin').value;

            if (enteredPin !== SECRET_PIN) {
                alert("❌ عفواً، الكود السري غير صحيح! لا يمكن تعديل النقط.");
                return;
            }

            const player = players.find(p => p.id === playerId);
            if (player) {
                player.points += amount;
                if (player.points < 0) player.points = 0; 
                updateUI();
            }
        }

        // تشغيل أول مرة
        updateUI();
    </script>
</body>
</html>
